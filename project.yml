name: BrowseCraft

options:
  bundleIdPrefix: xiefei
  deploymentTarget:
    iOS: "17.0"
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "1.0"
    CODE_SIGN_STYLE: Automatic
    TARGETED_DEVICE_FAMILY: "1,2"
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES

packages:
  BrowseCraftCore:
    path: ../BrowseCraftCore
  BrowseCraftRulesKit:
    path: ../BrowseCraftRulesKit
  KSPlayer:
    url: https://github.com/kingslay/KSPlayer.git
    branch: main
  WebUI:
    url: https://github.com/cybozu/WebUI.git
    exactVersion: 4.4.0
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads.git
    from: 12.0.0

targets:
  BrowseCraft:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: BrowseCraft
        excludes:
          - "**/*.md"
    dependencies:
      - package: BrowseCraftCore
        product: BrowseCraftCore
      - package: BrowseCraftRulesKit
        product: BrowseCraftRulesKit
      - package: KSPlayer
        product: KSPlayer
      - package: WebUI
        product: WebUI
      - package: GoogleMobileAds
        product: GoogleMobileAds
    configFiles:
      Debug: Config/CatalogEncryption.debug.xcconfig
      Release: Config/CatalogEncryption.release.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: xiefei.BrowseCraft
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: BrowseCraft/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
      configs:
        Debug:
          BROWSECRAFT_ENVIRONMENT_NAME: TEST
          BROWSECRAFT_REWARDED_AD_UNIT_ID: ca-app-pub-4351001986548416/2887798038
        Release:
          BROWSECRAFT_ENVIRONMENT_NAME: PROD
          BROWSECRAFT_REWARDED_AD_UNIT_ID: ""
    postBuildScripts:
      - name: Patch FFmpegKit Bundle Identifiers
        basedOnDependencyAnalysis: false
        script: |
          FRAMEWORK_PLIST="${TARGET_BUILD_DIR}/${WRAPPER_NAME}/Frameworks/libshaderc_combined.framework/Info.plist"
          if [ -f "$FRAMEWORK_PLIST" ]; then
            /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier com.kintan.ksplayer.libshaderc-combined" "$FRAMEWORK_PLIST"
          fi

  BrowseCraftTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: BrowseCraftTests
    dependencies:
      - target: BrowseCraft
      - package: BrowseCraftCore
        product: BrowseCraftCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: xiefei.BrowseCraftTests
        GENERATE_INFOPLIST_FILE: YES

  BrowseCraftUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: BrowseCraftUITests
    dependencies:
      - target: BrowseCraft
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: xiefei.BrowseCraftUITests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  BrowseCraft:
    build:
      targets:
        BrowseCraft: all
        BrowseCraftTests: [test]
    run:
      config: Debug
      storeKitConfiguration: BrowseCraft/Configuration/BrowseCraft.storekit
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - BrowseCraftTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  TEST BrowseCraft:
    build:
      targets:
        BrowseCraft: all
        BrowseCraftTests: [test]
    run:
      config: Debug
      storeKitConfiguration: BrowseCraft/Configuration/BrowseCraft.storekit
      environmentVariables:
        BROWSECRAFT_CATALOG_ENCRYPTION_KEYS: "$(BROWSECRAFT_CATALOG_ENCRYPTION_KEYS)"
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - BrowseCraftTests
    profile:
      config: Debug
    analyze:
      config: Debug
    archive:
      config: Debug

  PROD BrowseCraft:
    build:
      targets:
        BrowseCraft: all
    run:
      config: Release
      environmentVariables:
        BROWSECRAFT_CATALOG_ENCRYPTION_KEYS: "$(BROWSECRAFT_CATALOG_ENCRYPTION_KEYS)"
    profile:
      config: Release
    analyze:
      config: Release
    archive:
      config: Release
