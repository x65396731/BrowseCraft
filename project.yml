name: BrowseCraft

options:
  bundleIdPrefix: xiefei
  xcodeVersion: "26.6"
  deploymentTarget:
    iOS: "17.0"
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "1.0"
    CODE_SIGN_STYLE: Automatic
    TARGETED_DEVICE_FAMILY: "1,2"
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES

packages:
  BrowseCraftCore:
    path: ../BrowseCraftCore
  BrowseCraftRulesKit:
    path: ../BrowseCraftRulesKit
  KSPlayer:
    url: https://github.com/kingslay/KSPlayer.git
    branch: main
  WebUI:
    url: https://github.com/cybozu/WebUI.git
    exactVersion: 4.4.0
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads.git
    from: 12.0.0
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk.git
    from: 12.0.0

targets:
  BrowseCraft:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: BrowseCraft
        excludes:
          - "**/*.md"
    dependencies:
      - package: BrowseCraftCore
        product: BrowseCraftCore
      - package: BrowseCraftRulesKit
        product: BrowseCraftRulesKit
      - package: KSPlayer
        product: KSPlayer
      - package: WebUI
        product: WebUI
      - package: GoogleMobileAds
        product: GoogleMobileAds
      - package: Firebase
        product: FirebaseCore
      - package: Firebase
        product: FirebaseCrashlytics
      - package: Firebase
        product: FirebaseAnalytics
    configFiles:
      Debug: Config/CatalogEncryption.debug.xcconfig
      Release: Config/CatalogEncryption.release.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.xiefei.AnyPortal
        PRODUCT_NAME: AnyPortal
        PRODUCT_MODULE_NAME: BrowseCraft
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: BrowseCraft/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
      configs:
        Debug:
          BROWSECRAFT_ENVIRONMENT_NAME: TEST
          BROWSECRAFT_REWARDED_AD_UNIT_ID: ca-app-pub-4351001986548416/2887798038
          DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
        Release:
          BROWSECRAFT_ENVIRONMENT_NAME: PROD
          BROWSECRAFT_REWARDED_AD_UNIT_ID: ""
    postBuildScripts:
      - name: Upload Crashlytics Symbols
        basedOnDependencyAnalysis: false
        inputFiles:
          - ${DWARF_DSYM_FOLDER_PATH}/${DWARF_DSYM_FILE_NAME}
          - ${DWARF_DSYM_FOLDER_PATH}/${DWARF_DSYM_FILE_NAME}/Contents/Resources/DWARF/${PRODUCT_NAME}
          - ${DWARF_DSYM_FOLDER_PATH}/${DWARF_DSYM_FILE_NAME}/Contents/Info.plist
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/GoogleService-Info.plist
          - $(TARGET_BUILD_DIR)/$(EXECUTABLE_PATH)
        script: |
          "${BUILD_DIR%/Build/*}/SourcePackages/checkouts/firebase-ios-sdk/Crashlytics/run"
      - name: Patch FFmpegKit Bundle Identifiers
        basedOnDependencyAnalysis: false
        script: |
          FRAMEWORK_PATH="${TARGET_BUILD_DIR}/${WRAPPER_NAME}/Frameworks/libshaderc_combined.framework"
          FRAMEWORK_PLIST="${FRAMEWORK_PATH}/Info.plist"
          if [ -f "$FRAMEWORK_PLIST" ]; then
            /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier com.kintan.ksplayer.libshaderc-combined" "$FRAMEWORK_PLIST"

            # The framework has already been signed by the embed phase. Changing
            # Info.plist invalidates that signature and leaves its identifier at
            # the original underscore-based value, so sign the patched bundle again.
            if [ -n "${EXPANDED_CODE_SIGN_IDENTITY:-}" ] && [ "${CODE_SIGNING_ALLOWED:-YES}" != "NO" ]; then
              /usr/bin/codesign --force \
                --sign "$EXPANDED_CODE_SIGN_IDENTITY" \
                --preserve-metadata=entitlements,flags,runtime \
                "$FRAMEWORK_PATH"
            fi
          fi

  BrowseCraftTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: BrowseCraftTests
    dependencies:
      - target: BrowseCraft
      - package: BrowseCraftCore
        product: BrowseCraftCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: xiefei.BrowseCraftTests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/AnyPortal.app/AnyPortal"

  BrowseCraftUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: BrowseCraftUITests
    dependencies:
      - target: BrowseCraft
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: xiefei.BrowseCraftUITests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  BrowseCraft:
    build:
      targets:
        BrowseCraft: all
        BrowseCraftTests: [test]
    run:
      config: Debug
      storeKitConfiguration: BrowseCraft/BrowseCraft/Configuration/BrowseCraft.storekit
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - BrowseCraftTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  TEST BrowseCraft:
    build:
      targets:
        BrowseCraft: all
        BrowseCraftTests: [test]
    run:
      config: Debug
      storeKitConfiguration: BrowseCraft/BrowseCraft/Configuration/BrowseCraft.storekit
      environmentVariables:
        BROWSECRAFT_CATALOG_ENCRYPTION_KEYS: "$(BROWSECRAFT_CATALOG_ENCRYPTION_KEYS)"
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - BrowseCraftTests
    profile:
      config: Debug
    analyze:
      config: Debug
    archive:
      config: Debug

  PROD BrowseCraft:
    build:
      targets:
        BrowseCraft: all
    run:
      config: Release
      environmentVariables:
        BROWSECRAFT_CATALOG_ENCRYPTION_KEYS: "$(BROWSECRAFT_CATALOG_ENCRYPTION_KEYS)"
    profile:
      config: Release
    analyze:
      config: Release
    archive:
      config: Release
