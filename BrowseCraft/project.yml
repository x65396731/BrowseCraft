name: BrowseCraft

options:
  bundleIdPrefix: xiefei
  deploymentTarget:
    iOS: "17.0"
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "1.0"
    CODE_SIGN_STYLE: Automatic
    TARGETED_DEVICE_FAMILY: "1,2"
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES

targets:
  BrowseCraft:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: BrowseCraft
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: xiefei.BrowseCraft
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight

  BrowseCraftTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: BrowseCraftTests
    dependencies:
      - target: BrowseCraft
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: xiefei.BrowseCraftTests
        GENERATE_INFOPLIST_FILE: YES

  BrowseCraftUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: BrowseCraftUITests
    dependencies:
      - target: BrowseCraft
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: xiefei.BrowseCraftUITests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  BrowseCraft:
    build:
      targets:
        BrowseCraft: all
        BrowseCraftTests: [test]
        BrowseCraftUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - BrowseCraftTests
        - BrowseCraftUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
